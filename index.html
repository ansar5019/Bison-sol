<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BISON | The Beast That Charges</title>

<meta name="description" content="BISON is the unstoppable force on Solana. Strong. Fearless. Built Different.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{

font-family:'Space Grotesk',sans-serif;

background:#050505;

color:white;

overflow-x:hidden;

}

/* Aurora */

body::before{

content:'';

position:fixed;

width:100%;

height:100%;

background:
radial-gradient(circle at 20% 30%,rgba(0,255,140,.18),transparent 40%),
radial-gradient(circle at 80% 20%,rgba(255,200,0,.18),transparent 35%),
radial-gradient(circle at 50% 80%,rgba(0,120,255,.12),transparent 40%);

animation:aurora 12s linear infinite alternate;

z-index:-2;

}

@keyframes aurora{

0%{transform:scale(1);}
100%{transform:scale(1.2) rotate(8deg);}

}

/* Particles */

canvas{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

z-index:-1;

}

/* Navbar */

nav{

position:fixed;

top:0;

left:0;

width:100%;

padding:20px 8%;

display:flex;

justify-content:space-between;

align-items:center;

backdrop-filter:blur(25px);

background:rgba(255,255,255,.04);

border-bottom:1px solid rgba(255,255,255,.08);

z-index:999;

}

.logo{

font-size:32px;

font-weight:700;

letter-spacing:5px;

color:#ffd54f;

}

nav ul{

display:flex;

gap:35px;

list-style:none;

}

nav a{

color:white;

text-decoration:none;

font-weight:600;

transition:.4s;

}

nav a:hover{

color:#00ff88;

}

/* Hero */

.hero{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

text-align:center;

padding:40px;

position:relative;

overflow:hidden;

}

.hero img{

width:420px;

max-width:90%;

filter:drop-shadow(0 0 60px rgba(255,180,0,.4));

animation:float 5s ease-in-out infinite;

}

@keyframes float{

50%{

transform:translateY(-18px);

}

}

.hero h1{

font-size:120px;

letter-spacing:10px;

margin-top:25px;

background:linear-gradient(#fff,#ffd54f);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.hero p{

font-size:24px;

opacity:.8;

margin:20px auto;

max-width:700px;

line-height:1.7;

}

.buttons{

margin-top:40px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.btn{

padding:18px 42px;

border-radius:50px;

font-weight:700;

cursor:pointer;

text-decoration:none;

transition:.4s;

}

.buy{

background:#ffd54f;

color:black;

box-shadow:0 0 40px rgba(255,200,0,.45);

}

.buy:hover{

transform:translateY(-6px);

}

.chart{

border:2px solid #00ff88;

color:#00ff88;

}

.chart:hover{

background:#00ff88;

color:black;

}

/* Glass Card */

.glass{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:25px;

padding:35px;

}

/* Section */

section{

padding:120px 8%;

}

.title{

font-size:52px;

margin-bottom:20px;

}

.subtitle{

opacity:.7;

max-width:700px;

line-height:1.8;

margin-bottom:50px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.card{

transition:.5s;

}

.card:hover{

transform:translateY(-12px);

box-shadow:0 20px 50px rgba(0,255,150,.18);

}

.card h3{

font-size:30px;

margin-bottom:12px;

color:#ffd54f;

}

.card p{

opacity:.8;

line-height:1.7;

}

/* Responsive */

@media(max-width:900px){

.hero h1{

font-size:60px;

}

.hero p{

font-size:18px;

}

nav ul{

display:none;

}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<nav>

<div class="logo">BISON</div>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#about">About</a></li>

<li><a href="#tokenomics">Tokenomics</a></li>

<li><a href="#roadmap">Roadmap</a></li>

<li><a href="#faq">FAQ</a></li>

</ul>

</nav>

<section class="hero">

<div>

<img src="bison.png" alt="Bison">

<h1>BISON</h1>

<p>

The Beast doesn't run.

It charges.

Built for the strongest community on Solana.

</p>

<div class="buttons">

<a class="btn buy">BUY NOW</a>

<a class="btn chart">VIEW CHART</a>

</div>

</div>

</section>

</body>

</html>
